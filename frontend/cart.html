<!DOCTYPE html>
<html lang="ru" x-data="cartApp()" x-init="init()">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина - FanCanvas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0f2f5; }
        .pattern-bg { background-image: radial-gradient(#e0e0e0 1px, transparent 1px); background-size: 20px 20px; }
        .price-text { color: #E53935; }
        .card-shadow { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    </style>
</head>
<body class="pattern-bg min-h-screen">
    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="index.html" class="text-2xl font-bold text-teal-600">FanCanvas</a>
            <div class="flex items-center gap-4">
                <a href="index.html" class="text-gray-600 hover:text-teal-600"><i class="fas fa-home text-xl"></i></a>
                <a href="profile.html" class="text-gray-600 hover:text-teal-600"><i class="fas fa-user text-xl"></i></a>
            </div>
        </div>
    </header>
    <main class="max-w-5xl mx-auto px-4 py-8">
        <h1 class="text-2xl font-bold mb-6">Корзина</h1>
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-4">
                <template x-for="item in items" :key="item.id">
                    <div class="bg-white rounded-xl p-4 card-shadow flex gap-4">
                        <img :src="item.product.images[0]?.image_url" class="w-24 h-24 rounded-lg object-cover bg-gray-100">
                        <div class="flex-1">
                            <div class="flex justify-between items-start">
                                <h3 class="font-medium" x-text="item.product.title"></h3>
                                <button @click="remove(item.id)" class="text-gray-400 hover:text-red-500"><i class="fas fa-trash"></i></button>
                            </div>
                            <p class="text-xs text-gray-500 mt-1" x-text="item.product.category?.name"></p>
                            <div class="flex items-center justify-between mt-3">
                                <div class="flex items-center border-2 border-teal-500 rounded-full">
                                    <button @click="update(item.id, item.quantity - 1)" class="px-2 py-0.5 text-teal-600">-</button>
                                    <span x-text="item.quantity" class="px-2 w-8 text-center text-sm"></span>
                                    <button @click="update(item.id, item.quantity + 1)" class="px-2 py-0.5 text-teal-600">+</button>
                                </div>
                                <div class="price-text font-bold" x-text="(item.product.price * item.quantity) + '₽'"></div>
                            </div>
                        </div>
                    </div>
                </template>
                <div x-show="items.length === 0" class="text-center py-12 text-gray-500">
                    <i class="fas fa-shopping-basket text-4xl mb-4 text-gray-300"></i>
                    <p>Корзина пуста</p>
                    <a href="index.html" class="text-teal-600 hover:underline mt-2 inline-block">Перейти в каталог</a>
                </div>
            </div>
            <div class="lg:col-span-1">
                <div class="bg-white rounded-xl p-6 card-shadow sticky top-24">
                    <button @click="checkout()" :disabled="items.length === 0" class="w-full bg-teal-500 hover:bg-teal-600 disabled:bg-gray-300 text-white font-bold py-3 rounded-full shadow-lg transition mb-4">
                        Перейти к оформлению
                    </button>
                    <p class="text-xs text-gray-500 mb-4">Доступные способы и время доставки можно выбрать при оформлении заказа. Цена доставки оплачивается отдельно!</p>
                    <div class="border-t pt-4 space-y-2">
                        <div class="flex justify-between text-sm"><span>Товары (<span x-text="totalCount"></span>):</span><span class="font-bold" x-text="totalPrice + '₽'"></span></div>
                        <div class="flex justify-between text-lg font-bold"><span>Итог:</span><span class="price-text" x-text="totalPrice + '₽'"></span></div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script>
        function cartApp() {
            return {
                items: [],
                get totalPrice() { return this.items.reduce((sum, i) => sum + i.product.price * i.quantity, 0); },
                get totalCount() { return this.items.reduce((sum, i) => sum + i.quantity, 0); },
                async init() {
                    const token = localStorage.getItem('token');
                    if (!token) return window.location.href = 'login.html';
                    await this.load();
                },
                async load() {
                    const token = localStorage.getItem('token');
                    const res = await fetch('/api/cart', { headers: { 'Authorization': 'Bearer ' + token } });
                    this.items = await res.json();
                },
                async update(id, qty) {
                    const token = localStorage.getItem('token');
                    await fetch('/api/cart/' + id + '?quantity=' + qty, { method: 'PUT', headers: { 'Authorization': 'Bearer ' + token } });
                    await this.load();
                },
                async remove(id) {
                    const token = localStorage.getItem('token');
                    await fetch('/api/cart/' + id, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } });
                    await this.load();
                },
                checkout() { window.location.href = 'checkout.html'; }
            }
        }
    </script>
</body>
</html>
