<!DOCTYPE html>
<html lang="ru" x-data="app()" x-init="init()">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FanCanvas - Маркетплейс для художников</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f0f2f5; }
        .pattern-bg { background-image: radial-gradient(#e0e0e0 1px, transparent 1px); background-size: 20px 20px; }
        .price-text { color: #E53935; }
        .card-shadow { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .input-cyan { border: 2px solid #00BFA5; border-radius: 9999px; }
        .input-cyan:focus { outline: none; box-shadow: 0 0 0 3px rgba(0,191,165,0.2); }
    </style>
</head>
<body class="pattern-bg min-h-screen">
    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-4">
                    <a href="index.html" class="text-2xl font-bold text-teal-600">FanCanvas</a>
                    <button @click="showCatalog = !showCatalog" class="bg-teal-500 text-white px-4 py-1.5 rounded-full text-sm font-medium hover:bg-teal-600 transition">
                        <i class="fas fa-th-large mr-1"></i> Каталог
                    </button>
                </div>
                <div class="flex-1 max-w-xl mx-4">
                    <div class="relative">
                        <input x-model="searchQuery" @keyup.enter="doSearch()" type="text" placeholder="Искать..." class="w-full pl-4 pr-10 py-2 rounded-full border-2 border-teal-500 focus:outline-none focus:border-teal-600 bg-white/50">
                        <button @click="doSearch()" class="absolute right-2 top-1/2 -translate-y-1/2 text-teal-600 hover:text-teal-700">
                            <i class="fas fa-search text-lg"></i>
                        </button>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <template x-if="!user">
                        <a href="login.html" class="text-gray-600 hover:text-teal-600 flex flex-col items-center text-xs">
                            <i class="fas fa-user text-lg mb-0.5"></i>
                            <span>Войти</span>
                        </a>
                    </template>
                    <template x-if="user">
                        <div class="flex items-center gap-4">
                            <template x-if="user.role === 'artist'">
                                <button @click="toggleMode()" class="text-xs bg-teal-100 text-teal-700 px-2 py-1 rounded-full" x-text="artistMode ? 'Режим художника' : 'Режим покупателя'"></button>
                            </template>
                            <a href="favorites.html" class="text-gray-600 hover:text-teal-600 flex flex-col items-center text-xs">
                                <i class="fas fa-heart text-lg mb-0.5"></i>
                                <span>Избранное</span>
                            </a>
                            <a href="cart.html" class="text-gray-600 hover:text-teal-600 flex flex-col items-center text-xs relative">
                                <i class="fas fa-shopping-cart text-lg mb-0.5"></i>
                                <span>Корзина</span>
                                <span x-show="cartCount > 0" x-text="cartCount" class="absolute -top-1 -right-2 bg-red-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center"></span>
                            </a>
                            <a href="profile.html" class="text-gray-600 hover:text-teal-600 flex flex-col items-center text-xs">
                                <i class="fas fa-user text-lg mb-0.5"></i>
                                <span x-text="user.name"></span>
                            </a>
                        </div>
                    </template>
                </div>
            </div>
        </div>
        <div x-show="showCatalog" @click.away="showCatalog = false" class="absolute left-0 right-0 bg-white border-b border-gray-200 shadow-lg" style="display: none;">
            <div class="max-w-7xl mx-auto px-4 py-6 grid grid-cols-4 gap-8">
                <div>
                    <h3 class="font-bold text-teal-600 mb-3">Фандомы</h3>
                    <ul class="space-y-2 text-sm">
                        <li><a href="#" @click.prevent="filterFandomType('movie')" class="hover:text-teal-600"><i class="fas fa-film w-5"></i> Кино и сериалы</a></li>
                        <li><a href="#" @click.prevent="filterFandomType('anime')" class="hover:text-teal-600"><i class="fas fa-tv w-5"></i> Аниме и манга</a></li>
                        <li><a href="#" @click.prevent="filterFandomType('game')" class="hover:text-teal-600"><i class="fas fa-gamepad w-5"></i> Видеоигры</a></li>
                        <li><a href="#" @click.prevent="filterFandomType('comics')" class="hover:text-teal-600"><i class="fas fa-book w-5"></i> Комиксы</a></li>
                    </ul>
                </div>
                <div>
                    <h3 class="font-bold text-teal-600 mb-3">Категории</h3>
                    <ul class="space-y-2 text-sm">
                        <template x-for="cat in categories" :key="cat.id">
                            <li><a href="#" @click.prevent="filterCategory(cat.id)" class="hover:text-teal-600" x-text="cat.name"></a></li>
                        </template>
                    </ul>
                </div>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 py-4">
        <div class="bg-white rounded-xl p-4 card-shadow flex flex-wrap items-center gap-4">
            <select x-model="filters.category" @change="loadProducts()" class="border-2 border-teal-500 rounded-lg px-3 py-1.5 text-sm focus:outline-none">
                <option value="">Все категории</option>
                <template x-for="cat in categories" :key="cat.id">
                    <option :value="cat.id" x-text="cat.name"></option>
                </template>
            </select>
            <select x-model="filters.fandom" @change="loadProducts()" class="border-2 border-teal-500 rounded-lg px-3 py-1.5 text-sm focus:outline-none">
                <option value="">Все фандомы</option>
                <template x-for="f in fandoms" :key="f.id">
                    <option :value="f.id" x-text="f.name"></option>
                </template>
            </select>
            <div class="flex items-center gap-2">
                <input x-model="filters.minPrice" type="number" placeholder="от" class="w-20 border-2 border-teal-500 rounded-lg px-2 py-1.5 text-sm">
                <input x-model="filters.maxPrice" type="number" placeholder="до" class="w-20 border-2 border-teal-500 rounded-lg px-2 py-1.5 text-sm">
                <button @click="loadProducts()" class="text-teal-600 hover:text-teal-700"><i class="fas fa-check"></i></button>
            </div>
            <label class="flex items-center gap-2 text-sm cursor-pointer">
                <input x-model="filters.inStock" @change="loadProducts()" type="checkbox" class="rounded text-teal-600 focus:ring-teal-500">
                <span>В наличии</span>
            </label>
            <div class="ml-auto flex items-center gap-2">
                <span class="text-sm text-gray-500">Сортировка:</span>
                <select x-model="filters.sort" @change="loadProducts()" class="border-2 border-teal-500 rounded-lg px-3 py-1.5 text-sm">
                    <option value="newest">По новизне</option>
                    <option value="price_asc">Цена ↑</option>
                    <option value="price_desc">Цена ↓</option>
                    <option value="popular">Популярность</option>
                </select>
            </div>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-4 pb-12">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <template x-for="(product, index) in products" :key="index">
                <div class="bg-white rounded-xl overflow-hidden card-shadow hover:shadow-xl transition group">
                    <div class="relative aspect-square bg-gray-100 overflow-hidden">
                        <img
                        :src="product.images.length ? product.images[0].image_url : 'https://via.placeholder.com/400?text=No+Image'"
                        class="w-full h-full object-cover group-hover:scale-105 transition duration-300">
                        <button @click="toggleFavorite(product.id)" class="absolute top-3 right-3 w-8 h-8 bg-white/90 rounded-full flex items-center justify-center shadow hover:bg-teal-500 hover:text-white transition">
                            <i class="far fa-heart"></i>
                        </button>
                    </div>
                    <div class="p-4">
                        <div class="flex items-start justify-between mb-1">
                            <span class="price-text font-bold text-lg" x-text="product.price + '₽'"></span>
                        </div>
                        <h3 class="font-medium text-gray-900 mb-1 line-clamp-1" x-text="product.title"></h3>
                        <p class="text-xs text-gray-500 mb-2" x-text="product.category?.name || 'Без категории'"></p>
                        <div class="flex items-center justify-between text-xs text-gray-500">
                            <div class="flex items-center gap-1">
                                <i class="fas fa-star text-yellow-400"></i>
                                <span>4.9</span>
                            </div>
                            <span x-text="product.stock > 0 ? 'В наличии ' + product.stock + ' шт.' : 'Нет в наличии'" :class="product.stock > 0 ? 'text-green-600' : 'text-red-500'"></span>
                        </div>
                        <a :href="'product.html?id=' + product.id" class="mt-3 block text-center bg-teal-50 text-teal-700 py-2 rounded-lg text-sm font-medium hover:bg-teal-100 transition">Подробнее</a>
                    </div>
                </div>
            </template>
        </div>
        <div x-show="products.length === 0" class="text-center py-20 text-gray-500">
            <i class="fas fa-search text-4xl mb-4 text-gray-300"></i>
            <p>Товары не найдены</p>
        </div>
    </main>

    <script>
        function app() {
            return {
                user: null,
                artistMode: false,
                cartCount: 0,
                showCatalog: false,
                searchQuery: '',
                categories: [],
                fandoms: [],
                products: [],
                filters: { category: '', fandom: '', minPrice: '', maxPrice: '', inStock: false, sort: 'newest' },
                async init() {
                    await this.loadUser();
                    await this.loadCategories();
                    await this.loadFandoms();
                    await this.loadProducts();
                    await this.loadCartCount();
                },
                async loadUser() {
                    const token = localStorage.getItem('token');
                    if (!token) return;
                    try {
                        const res = await fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + token } });
                        if (res.ok) this.user = await res.json();
                    } catch(e) {}
                },
                async loadCategories() {
                    const res = await fetch('/api/categories');
                    this.categories = await res.json();
                },
                async loadFandoms() {
                    const res = await fetch('/api/fandoms');
                    this.fandoms = await res.json();
                },
                async loadProducts() {
                    const params = new URLSearchParams();
                    if (this.filters.category) params.append('category_id', this.filters.category);
                    if (this.filters.fandom) params.append('fandom_id', this.filters.fandom);
                    if (this.filters.minPrice) params.append('min_price', this.filters.minPrice);
                    if (this.filters.maxPrice) params.append('max_price', this.filters.maxPrice);
                    if (this.filters.inStock) params.append('in_stock', 'true');
                    if (this.filters.sort) params.append('sort', this.filters.sort);
                    if (this.searchQuery) params.append('search', this.searchQuery);
                    const res = await fetch('/api/products?' + params.toString());
                    const data = await res.json();
                    this.products = data.items;
                },
                async loadCartCount() {
                    const token = localStorage.getItem('token');
                    if (!token) return;
                    const res = await fetch('/api/cart', { headers: { 'Authorization': 'Bearer ' + token } });
                    if (res.ok) {
                        const items = await res.json();
                        this.cartCount = items.reduce((sum, i) => sum + i.quantity, 0);
                    }
                },
                doSearch() { this.loadProducts(); },
                filterCategory(id) { this.filters.category = id; this.showCatalog = false; this.loadProducts(); },
                filterFandomType(type) {
                    fetch('/api/fandoms?fandom_type=' + type).then(r => r.json()).then(data => { this.fandoms = data; });
                    this.showCatalog = false;
                },
                toggleMode() {
                    this.artistMode = !this.artistMode;
                    if (this.artistMode) window.location.href = 'artist-dashboard.html';
                },
                async toggleFavorite(id) {
                    const token = localStorage.getItem('token');
                    if (!token) { window.location.href = 'login.html'; return; }
                    await fetch('/api/favorites/' + id, { method: 'POST', headers: { 'Authorization': 'Bearer ' + token } });
                }
            }
        }
    </script>
</body>
</html>
